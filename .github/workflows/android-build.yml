name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 1.0.2
    paths:
      - 'src/**'
      - 'logic.ts'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'capacitor.config.ts'

env:
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install dependencies
        run: npm ci

      - name: Sync web to Android
        run: npm run android:sync

      - name: Get version
        run: echo "VERSION=${npm_package_version}" >> $GITHUB_ENV

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          release_name: HRT Tracker v${{ env.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: android/app/build/outputs/apk/debug/*.apk
          asset_name: HRT-Tracker-${{ env.VERSION }}.apk
          asset_content_type: application/vnd.android.package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk-${{ env.VERSION }}
          path: android/app/build/outputs/apk/debug/*.apk
