name: Android Build

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
            ~/Library/Caches/Android/build-cache
          key: android-sdk-${{ runner.os }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Sync web to Android
        run: npm run android:sync

      - name: Create keystore for release
        env:
          KS_FILE: ${{ secrets.KS_FILE }}
          KS_STORE_PASS: ${{ secrets.KS_STORE_PASS }}
          KS_KEY_PASS: ${{ secrets.KS_KEY_PASS }}
          KS_ALIAS: ${{ secrets.KS_ALIAS }}
        run: |
          mkdir -p android/app
          cd android/app
          echo "=== KS_FILE length ==="
          printf '%s' "$KS_FILE" | wc -c
          echo "=== First 50 chars (hex) ==="
          printf '%s' "$KS_FILE" | head -c 50 | od -A x -t x1z
          echo "=== Last 50 chars (hex) ==="
          printf '%s' "$KS_FILE" | tail -c 50 | od -A x -t x1z
          printf '%s' "$KS_FILE" | base64 -d > key.jks 2>&1 | head -n 10
          ls -la key.jks
          cd ..
          printf 'storePassword=%s\n' "$KS_STORE_PASS" > keystore.properties
          printf 'keyPassword=%s\n' "$KS_KEY_PASS" >> keystore.properties
          printf 'keyAlias=%s\n' "$KS_ALIAS" >> keystore.properties
          printf 'storeFile=app/key.jks\n' >> keystore.properties
          cat keystore.properties

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --build-cache
          ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Release APK not found"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK not found"

      - name: Check APK output
        run: find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: android/app/build/outputs/apk/release/*.apk
          asset_name: HRT-Tracker-${{ github.event.release.tag_name }}.apk
          asset_content_type: application/vnd.android.package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
