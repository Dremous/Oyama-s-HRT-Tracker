name: Android Build

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/build-cache
            ~/Library/Caches/Android/build-cache
          key: android-sdk-${{ runner.os }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Sync web to Android
        run: npm run android:sync

      - name: Create keystore for release
        run: |
          cd android/app
          echo "$KEYSTORE_FILE" | base64 -d > key.jks
          ls -la key.jks
          keytool -list -keystore key.jks -storepass 547899 -storetype JKS 2>&1 || echo "Keytool failed"
          echo "storePassword=$STORE_PASSWORD" > keystore.properties
          echo "keyPassword=$KEY_PASSWORD" >> keystore.properties
          echo "keyAlias=$KEY_ALIAS" >> keystore.properties
          echo "storeFile=key.jks" >> keystore.properties
          cat keystore.properties

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --build-cache --info 2>&1 | tail -50

      - name: Check APK output
        run: find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: android/app/build/outputs/apk/release/*.apk
          asset_name: HRT-Tracker-${{ github.event.release.tag_name }}.apk
          asset_content_type: application/vnd.android.package
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/apk/release/*.apk
